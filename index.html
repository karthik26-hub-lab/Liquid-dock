<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Clean Glass Dock & Theme Toggle</title>
  <style>
    /* --- Theme Variables --- */
    :root {
      /* Increased opacity for better contrast over dark images */
      --nav-bg: rgba(255, 255, 255, 0.65);
      --nav-border-top: rgba(255, 255, 255, 0.8);
      --nav-border-bottom: rgba(255, 255, 255, 0.2);
      
      /* Darker default icons so they show up clearly on the bright glass */
      --icon-default: rgba(0, 0, 0, 0.5);
      --icon-active: #000000;
      
      /* Theme Toggle Colors */
      --toggle-bg: rgba(255, 255, 255, 0.65);
      --toggle-border: rgba(255, 255, 255, 0.8);
      
      /* Liquid Glass Droplet Styling */
      --water-grad: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.4) 60%, rgba(255, 255, 255, 0.1) 100%);
      --water-rim: inset 2px 2px 4px rgba(255, 255, 255, 0.9), inset -2px -2px 5px rgba(0, 0, 0, 0.05);
      --water-drop: 0 8px 16px rgba(0, 0, 0, 0.15);
      
      --shadow-low: 0 10px 30px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] {
      /* Dark mode frosted glass */
      --nav-bg: rgba(15, 15, 18, 0.65);
      --nav-border-top: rgba(255, 255, 255, 0.15);
      --nav-border-bottom: rgba(0, 0, 0, 0.6);
      
      /* Lighter default icons for dark glass */
      --icon-default: rgba(255, 255, 255, 0.5);
      --icon-active: #ffffff;
      
      /* Theme Toggle Colors */
      --toggle-bg: rgba(15, 15, 18, 0.65);
      --toggle-border: rgba(255, 255, 255, 0.15);
      
      /* Liquid Glass Droplet Styling */
      --water-grad: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.05) 60%, rgba(0, 0, 0, 0.3) 100%);
      --water-rim: inset 1px 1px 3px rgba(255, 255, 255, 0.3), inset -2px -2px 5px rgba(0, 0, 0, 0.5);
      --water-drop: 0 8px 16px rgba(0, 0, 0, 0.4);
      
      --shadow-low: 0 10px 30px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #111; 
      
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overscroll-behavior-y: none; 
    }

    /* --- Scaled Up Draggable Glass Toggle Switch --- */
    .theme-switch {
      position: absolute;
      top: 40px;
      right: 40px;
      display: inline-block;
      width: 80px; 
      height: 44px; 
      z-index: 10;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--toggle-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--toggle-border);
      border-radius: 44px;
      box-shadow: var(--shadow-low);
      transition: background 0.4s ease, border-color 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      -webkit-tap-highlight-color: transparent;
    }

    .slider .knob {
      position: absolute;
      height: 34px; 
      width: 34px;  
      left: 4px;
      bottom: 4px;
      background: var(--water-grad); 
      box-shadow: var(--water-rim), 0 2px 6px rgba(0,0,0,0.15);
      border-radius: 50%;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease, box-shadow 0.4s ease;
      z-index: 1; 
    }

    input:checked + .slider .knob {
      transform: translateX(38px); 
    }

    .slider svg {
      width: 18px; 
      height: 18px; 
      z-index: 2;
      position: relative;
      pointer-events: none; 
      transition: color 0.4s ease;
    }

    input:not(:checked) + .slider .sun-icon { color: #000000; }
    input:not(:checked) + .slider .moon-icon { color: rgba(0, 0, 0, 0.4); }
    
    input:checked + .slider .moon-icon { color: #ffffff; }
    input:checked + .slider .sun-icon { color: rgba(255, 255, 255, 0.4); }

    /* --- Universal Floating Bottom Dock --- */
    .bottom-nav {
      position: fixed; 
      bottom: calc(48px + env(safe-area-inset-bottom)); 
      left: 50%;
      transform: translateX(-50%);
      
      width: calc(100% - 40px); 
      max-width: 600px; 
      height: 84px;     
      
      background: var(--nav-bg);
      backdrop-filter: blur(28px) saturate(200%); 
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      
      border-top: 1px solid var(--nav-border-top);
      border-bottom: 1px solid var(--nav-border-bottom);
      border-left: 1px solid var(--nav-border-top);
      border-right: 1px solid var(--nav-border-bottom);
      
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      border-radius: 42px; 
      padding: 0 12px;
      box-shadow: var(--shadow-low);
      
      transition: background 0.5s ease, border-color 0.5s ease;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 1000;
    }

    /* --- Static Liquid Glass Indicator (Moving effect removed) --- */
    .liquid-glass-indicator {
      position: absolute;
      top: 50%;
      left: 0;
      height: 60px; 
      background: var(--water-grad); 
      box-shadow: var(--water-rim), var(--water-drop);
      
      /* Perfectly rounded pill shape */
      border-radius: 30px; 
      
      z-index: 1;
      /* Animation is completely driven by Javascript drags/clicks now */
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    /* --- Icons --- */
    .nav-item {
      position: relative;
      z-index: 2; 
      display: flex;
      justify-content: center;
      align-items: center;
      width: 64px;  
      height: 64px; 
      color: var(--icon-default); 
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.4s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-user-drag: none;
    }

    .nav-item.active {
      color: var(--icon-active);
      transform: scale(1.05); 
    }
    
    .nav-item.active svg {
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
    }
    [data-theme="dark"] .nav-item.active svg {
      filter: drop-shadow(0 2px 6px rgba(255,255,255,0.25));
    }

    .nav-item:active { transform: scale(0.85); }

    .icon-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none; 
    }
  </style>
</head>
<body>

  <label class="theme-switch" aria-label="Toggle Dark Mode">
    <input type="checkbox" id="theme-toggle-input">
    <div class="slider">
      <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <div class="knob"></div>
    </div>
  </label>

  <nav class="bottom-nav">
    <div class="liquid-glass-indicator"></div>

    <a href="#" class="nav-item active" aria-label="Home">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9.005 16.545a2.997 2.997 0 0 1 2.997-2.997h0a2.997 2.997 0 0 1 2.997 2.997v4.45h4.004a2.996 2.996 0 0 0 2.996-2.996V11.51a3 3 0 0 0-.96-2.2l-6-5.5a3.003 3.003 0 0 0-4.068 0l-6 5.5a3 3 0 0 0-.96 2.2v6.488a2.996 2.996 0 0 0 2.996 2.996h4.004v-4.45Z"></path>
      </svg>
    </a>

    <a href="#" class="nav-item" aria-label="Videos">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
        <polygon points="10 9 15 12 10 15 10 9" fill="currentColor" stroke="none"></polygon>
      </svg>
    </a>

    <a href="#" class="nav-item" aria-label="Share">
      <div class="icon-container">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </div>
    </a>

    <a href="#" class="nav-item" aria-label="Search">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="10.5" cy="10.5" r="7.5"></circle>
        <line x1="21" y1="21" x2="15.8" y2="15.8"></line>
      </svg>
    </a>

    <a href="#" class="nav-item" aria-label="Profile">
      <div class="icon-container">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
    </a>
  </nav>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // --- Draggable Theme Toggle Logic ---
      const themeSwitch = document.querySelector('.theme-switch');
      const themeInput = document.getElementById('theme-toggle-input');
      const themeKnob = document.querySelector('.slider .knob');
      
      let isToggleDragging = false;
      let toggleStartX = 0;
      const toggleMaxTravel = 38; 

      function updateTheme() {
        if (themeInput.checked) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      }

      themeInput.addEventListener('change', updateTheme);

      themeSwitch.addEventListener('pointerdown', (e) => {
        isToggleDragging = true;
        toggleStartX = e.clientX;
        themeKnob.style.transition = 'none'; 
        themeSwitch.setPointerCapture(e.pointerId);
      });

      themeSwitch.addEventListener('pointermove', (e) => {
        if (!isToggleDragging) return;
        let deltaX = e.clientX - toggleStartX;
        let startBase = themeInput.checked ? toggleMaxTravel : 0;
        let newX = startBase + deltaX;

        if (newX < 0) newX = 0;
        if (newX > toggleMaxTravel) newX = toggleMaxTravel;

        themeKnob.style.transform = `translateX(${newX}px)`;
      });

      themeSwitch.addEventListener('pointerup', (e) => {
        if (!isToggleDragging) return;
        isToggleDragging = false;
        
        themeKnob.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease, box-shadow 0.4s ease';
        
        let deltaX = e.clientX - toggleStartX;
        
        if (Math.abs(deltaX) > 10) { 
          if (deltaX > 0 && !themeInput.checked) {
            themeInput.checked = true;
            updateTheme();
          } else if (deltaX < 0 && themeInput.checked) {
            themeInput.checked = false;
            updateTheme();
          }
        }
        
        themeKnob.style.transform = '';
      });

      // --- Nav Dock Drag Logic ---
      const navItems = Array.from(document.querySelectorAll('.nav-item'));
      const indicator = document.querySelector('.liquid-glass-indicator');
      const navBar = document.querySelector('.bottom-nav');

      let currentActive = document.querySelector('.nav-item.active') || navItems[0];
      
      let isDragging = false;
      let wasDragging = false;
      let startX = 0;
      let initialTranslateX = 0;

      function getRelativeLeft(element) {
        const navRect = navBar.getBoundingClientRect();
        const elRect = element.getBoundingClientRect();
        return elRect.left - navRect.left;
      }

      function moveLiquidGlass(element) {
        const left = getRelativeLeft(element);
        
        indicator.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.2, 0.64, 1)';
        indicator.style.width = `${element.offsetWidth}px`;
        indicator.style.transform = `translate(${left}px, -50%)`;

        navItems.forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
        currentActive = element;
        
        if (window.navigator && window.navigator.vibrate) {
          window.navigator.vibrate(10); 
        }
      }

      setTimeout(() => moveLiquidGlass(currentActive), 50);

      navItems.forEach(item => {
        item.addEventListener('click', function(e) {
          e.preventDefault(); 
          if (wasDragging) return; 
          moveLiquidGlass(this);
        });
      });

      navBar.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return; 
        
        isDragging = true;
        wasDragging = false;
        startX = e.clientX;
        
        const transform = window.getComputedStyle(indicator).transform;
        if (transform !== 'none') {
          const matrixValues = transform.match(/matrix.*\((.+)\)/)[1].split(', ');
          initialTranslateX = parseFloat(matrixValues[4]);
        } else {
          initialTranslateX = getRelativeLeft(currentActive);
        }

        navBar.setPointerCapture(e.pointerId);
      });

      navBar.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        
        const deltaX = e.clientX - startX;
        
        if (Math.abs(deltaX) > 3) {
          wasDragging = true;
          indicator.style.transition = 'none'; 
          
          let newX = initialTranslateX + deltaX;
          
          const minX = getRelativeLeft(navItems[0]);
          const maxX = getRelativeLeft(navItems[navItems.length - 1]);
          
          if (newX < minX) {
            newX = minX;
          } else if (newX > maxX) {
            newX = maxX;
          }

          indicator.style.transform = `translate(${newX}px, -50%)`;
        }
      });

      navBar.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        
        if (wasDragging) {
          const transform = window.getComputedStyle(indicator).transform;
          let currentX = 0;
          if (transform !== 'none') {
            const matrixValues = transform.match(/matrix.*\((.+)\)/)[1].split(', ');
            currentX = parseFloat(matrixValues[4]);
          }
          
          const indicatorCenter = currentX + (indicator.offsetWidth / 2);
          
          let closestItem = navItems[0];
          let minDistance = Infinity;

          navItems.forEach(item => {
            const itemLeft = getRelativeLeft(item);
            const itemCenter = itemLeft + (item.offsetWidth / 2);
            const distance = Math.abs(indicatorCenter - itemCenter);
            
            if (distance < minDistance) {
              minDistance = distance;
              closestItem = item;
            }
          });

          moveLiquidGlass(closestItem);
        }
      });

      window.addEventListener('resize', () => {
        if (currentActive) moveLiquidGlass(currentActive);
      });
    });
  </script>
</body>
</html>
